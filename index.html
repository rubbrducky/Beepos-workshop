<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Beepo's Workshop</title>
<style>
/* ============================================================
   BEEPO'S WORKSHOP v2
   - Beepo hosts the build (hard hat + wrench + reactions)
   - 5 bases x 5 tops, all 25 machines named
   - Paint pots + dice shuffle after building
   - Big red lever -> test drive (scrolling world per base,
     rocket blasts off + parachutes home)
   - Beepo's requests -> star shelf -> trophy
   - Poke the finished machine (top / face / base all react)
   - Tiny workshop tune + sfx, both toggleable
   ============================================================ */
*{ margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
:root{
  --ink:#4A3B47; --cream:#FFF3DC; --wall:#FDEBC8; --peg:#DCE8F1;
  --wood:#E0A860; --woodD:#B97F3E; --steel:#8FA3C8; --steelD:#5A6B8C;
  --orange:#F5872E; --red:#E23B4E; --teal:#5FD6CD;
  --u:1vmin; --bench:10vh;
}
@media (orientation:landscape){ :root{ --u:.62vmin; } }
html,body{ height:100%; overflow:hidden; overscroll-behavior:none; touch-action:none; }
body{
  font-family:'Baloo 2','Comic Sans MS','Trebuchet MS',system-ui,sans-serif;
  background:linear-gradient(180deg,#FDF3D8 0%, var(--wall) 55%, #F7E0B4 100%);
  color:var(--ink); position:fixed; inset:0; display:flex; flex-direction:column;
}
button{ font:inherit; color:inherit; background:none; border:none; cursor:pointer; touch-action:manipulation; }
:focus-visible{ outline:.5vh solid var(--orange); outline-offset:.3vh; border-radius:2vh; }
.icon{ display:block; }

/* ---------- TOP BAR ---------- */
#topbar{ flex:0 0 auto; height:7vh; display:flex; align-items:center; gap:2vw; padding:0 3vw; z-index:20; }
#stars{ display:flex; gap:1.4vw; align-items:center; background:rgba(255,255,255,.55);
  border:.45vh solid #F0D9A8; border-radius:3vh; padding:.6vh 2vw; }
.sock{ width:4.4vh; height:4.4vh; display:block; }
.sock svg{ width:100%; height:100%; }
.sock path{ fill:#FFF7E0; stroke:var(--ink); stroke-width:7; stroke-linejoin:round; transition:fill .2s; }
.sock.on path{ fill:#FFD34D; }
.sock.on{ animation:sockPop .45s cubic-bezier(.3,1.6,.5,1) 1; }
@keyframes sockPop{ 0%{transform:scale(.4)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }
#topbar .spacer{ flex:1; }
.tbtn{ width:5.6vh; height:5.6vh; border-radius:50%; background:var(--cream);
  border:.5vh solid var(--ink); box-shadow:0 .5vh 0 #D9BE8C; display:flex; align-items:center; justify-content:center; }
.tbtn:active{ transform:translateY(.4vh); box-shadow:0 .1vh 0 #D9BE8C; }
.tbtn svg{ width:62%; height:62%; }
.tbtn.off{ opacity:.55; }

/* ---------- STAGE ---------- */
#stage{ flex:1 1 auto; position:relative; min-height:0; overflow:hidden;
  display:flex; align-items:flex-end; justify-content:center;
  padding-bottom:calc(var(--bench) + .5vh); }

#stage.driving #pegboard, #stage.driving #poster, #stage.driving #gearDeco{ opacity:.14; }
#pegboard, #poster, #gearDeco{ transition:opacity .5s ease; }
#pegboard{ position:absolute; z-index:1; top:1.5vh; left:5vw; right:5vw; height:52%;
  background-color:var(--peg);
  background-image:radial-gradient(circle at 1.1vh 1.1vh, #B9CBDC 0 .45vh, transparent .55vh);
  background-size:3.4vh 3.4vh;
  border:.6vh solid var(--ink); border-radius:3.5vh; opacity:.9; }
#poster{ position:absolute; z-index:1; top:4.5vh; left:9vw; width:16vh; transform:rotate(-5deg); }
#poster svg{ width:100%; display:block; }
#gearDeco{ position:absolute; z-index:1; top:4vh; right:8vw; width:9.5vh; opacity:.9; }
#gearDeco svg{ width:100%; display:block; animation:gearSpin 14s linear infinite; }
@keyframes gearSpin{ to{ transform:rotate(360deg) } }

#bench{ position:absolute; z-index:3; left:-1vw; right:-1vw; bottom:0; height:var(--bench);
  background:linear-gradient(180deg, var(--wood) 0 62%, #C98F4C 62% 100%);
  border-top:.8vh solid var(--ink); transition:transform .3s ease; }
#bench::after{ content:''; position:absolute; left:0; right:0; bottom:0; height:2.3vh;
  background:repeating-linear-gradient(45deg, #FFD94A 0 2.2vh, var(--ink) 2.2vh 4.4vh);
  border-top:.5vh solid var(--ink); opacity:.95; }
#bench.hide{ transform:translateY(112%); }

#terrain{ position:absolute; z-index:2; left:-3vw; right:-3vw; bottom:0; height:var(--bench);
  display:none; border-top:.8vh solid var(--ink); }
#terrain::before{ content:''; position:absolute; left:0; right:0; }
#terrain.t-wheels{ background:#8496B1; }
#terrain.t-wheels::before{ top:44%; height:1.1vh;
  background:repeating-linear-gradient(90deg,#FFF7E0 0 5vh, transparent 5vh 11vh); }
#terrain.t-legs{ background-color:#7CC46B;
  background-image:radial-gradient(circle at 1.6vh 0, #5FA854 0 1.2vh, transparent 1.4vh);
  background-size:3.2vh 2.4vh; background-repeat:repeat-x; }
#terrain.t-hull{ background-color:#9FD8E8;
  background-image:radial-gradient(circle at 1.6vh 0, #6B8BE8 0 1.3vh, transparent 1.5vh);
  background-size:3.2vh 2.6vh; background-repeat:repeat-x; }
#terrain.t-rails{ background-color:#DCCBA6;
  background-image:repeating-linear-gradient(90deg, #8A5A3B 0 2.2vh, transparent 2.2vh 6.4vh);
  background-size:6.4vh 3.4vh; background-repeat:repeat-x; background-position:0 42%; }
#terrain.t-rails::before{ top:26%; height:4vh;
  background:linear-gradient(#B97F3E 0 26%, transparent 26% 74%, #B97F3E 74%); }
#terrain.run{ animation:terrScroll .9s linear infinite; }
#terrain.run::before{ animation:dashScroll .8s linear infinite; }
@keyframes terrScroll{ to{ background-position-x:-51.2vh } }
@keyframes dashScroll{ to{ background-position-x:-44vh } }

#props{ position:absolute; inset:0; z-index:4; pointer-events:none; overflow:hidden; }
.prp{ position:absolute; will-change:transform; }
.prp svg{ width:100%; height:100%; display:block; }

/* ---------- BEEPO ---------- */
#beepo{ position:absolute; z-index:4; left:1.5vw; bottom:calc(var(--bench) - 1.2vh);
  width:calc(var(--u)*24); }
#beepo svg{ width:100%; display:block; }
#beepo .bfx{ display:none; }
#beepo.f-normal .b-normal{ display:block; }
#beepo.f-grin .b-grin{ display:block; }
#beepo.f-wow .b-wow{ display:block; }
#beepo.hop{ animation:bHop .55s cubic-bezier(.3,1.5,.5,1) 1; }
@keyframes bHop{ 0%,100%{transform:translateY(0)} 40%{transform:translateY(calc(var(--u)*-7))} }
#beepo .beye{ animation:blink 4.2s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
@keyframes blink{ 0%,93%,100%{transform:scaleY(1)} 96%{transform:scaleY(.12)} }
#bbl{ position:absolute; z-index:6; left:calc(var(--u)*3); bottom:calc(var(--bench) + var(--u)*24);
  max-width:52vw; background:#fff; border:.55vh solid var(--ink); border-radius:2.6vh; padding:1vh 2.4vw;
  font-weight:800; font-size:min(4.6vw,2.6vh); line-height:1.15; opacity:0; transform:scale(.6) translateY(1.5vh);
  transform-origin:15% 100%; transition:opacity .18s, transform .18s; pointer-events:none; }
#bbl::after{ content:''; position:absolute; left:14%; bottom:-1.9vh; width:2.4vh; height:2.4vh;
  background:#fff; border-right:.55vh solid var(--ink); border-bottom:.55vh solid var(--ink);
  transform:rotate(45deg); border-radius:0 0 .6vh 0; }
#bbl.show{ opacity:1; transform:scale(1) translateY(0); }
#reqChip{ position:absolute; z-index:6; left:calc(var(--u)*17); bottom:calc(var(--bench) + var(--u)*20);
  width:8.5vh; height:8.5vh; background:#FFF; border:.55vh solid var(--ink); border-radius:50%;
  display:none; align-items:center; justify-content:center;
  box-shadow:0 .6vh 0 rgba(74,59,71,.18); }
#reqChip.show{ display:flex; animation:chipIn .4s cubic-bezier(.3,1.6,.5,1) 1; }
#reqChip svg{ width:66%; height:66%; }
#reqChip.win{ animation:chipWin .7s ease 1; background:#FFE9A8; }
@keyframes chipIn{ 0%{transform:scale(.2)} 70%{transform:scale(1.12)} 100%{transform:scale(1)} }
@keyframes chipWin{ 0%,100%{transform:rotate(0)} 25%{transform:rotate(-14deg) scale(1.15)} 65%{transform:rotate(12deg) scale(1.15)} }

/* ---------- MACHINE ---------- */
#machine{ position:relative; z-index:5; margin-left:calc(var(--u)*7); }
#machine.celebrate{ animation:jump .8s cubic-bezier(.3,1.4,.5,1) 1; }
@keyframes jump{ 0%{transform:translateY(0)} 30%{transform:translateY(calc(var(--u)*-7)) scale(1.04)} 60%{transform:translateY(0) scale(.99)} 80%{transform:translateY(calc(var(--u)*-1.6))} 100%{transform:translateY(0)} }
#machine.shake{ animation:shake .1s linear infinite; }
@keyframes shake{ 0%{transform:translate(calc(var(--u)*-.6),0)} 25%{transform:translate(calc(var(--u)*.6),calc(var(--u)*-.4))} 50%{transform:translate(calc(var(--u)*-.5),calc(var(--u)*.4))} 75%{transform:translate(calc(var(--u)*.5),0)} 100%{transform:translate(calc(var(--u)*-.6),0)} }
#machine.wheelie #inner{ animation:wheelie .55s ease 1; transform-origin:70% 96%; }
@keyframes wheelie{ 0%,100%{transform:rotate(0)} 40%{transform:rotate(-9deg)} }
#machine.hopOnce #inner{ animation:hopOnce .5s cubic-bezier(.3,1.5,.5,1) 1; }
@keyframes hopOnce{ 0%,100%{transform:translateY(0)} 45%{transform:translateY(calc(var(--u)*-6))} }

#inner{ display:flex; flex-direction:column; align-items:center; justify-content:flex-end; }
.slot{ position:relative; display:flex; align-items:center; justify-content:center; }
#topSlot{ width:calc(var(--u)*34); height:calc(var(--u)*26); z-index:2; }
#bodySlot{ width:calc(var(--u)*50); height:calc(var(--u)*33); z-index:3; margin-top:calc(var(--u)*-3); }
#baseSlot{ width:calc(var(--u)*52); height:calc(var(--u)*19); z-index:1; margin-top:calc(var(--u)*-2); }
.slot svg{ width:100%; height:100%; display:block; overflow:visible; }
.fill{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.placeholder{ width:74%; height:80%; border-radius:calc(var(--u)*6); border:calc(var(--u)*.9) dashed #C4A97E;
  display:flex; align-items:center; justify-content:center; color:#C4A97E; }
.placeholder svg{ width:38%; height:38%; opacity:.6; }
.slot.active .placeholder{ border-color:var(--orange); color:var(--orange); animation:pulse 1s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.08);opacity:1} }
.pop{ animation:pop .45s cubic-bezier(.3,1.5,.5,1) 1; }
@keyframes pop{ 0%{transform:scale(.2);opacity:0} 60%{transform:scale(1.12)} 100%{transform:scale(1);opacity:1} }

/* machine face state */
.m-open{ display:none; }
#bodySlot.giggle .eyeOpen, #machine.drv .eyeOpen{ display:none; }
.eyeShut{ display:none; }
#bodySlot.giggle .eyeShut{ display:block; }
#machine.drv .m-smile, #bodySlot.giggle .m-smile{ display:none; }
#machine.drv .m-open, #bodySlot.giggle .m-open{ display:block; }
.pupil{ transform:translate(var(--px,0), var(--py,0)); }

/* part idle animations */
.wheel{ transform-box:fill-box; transform-origin:center; animation:spin 1s linear infinite; }
.wheelS{ transform-box:fill-box; transform-origin:center; animation:spin .6s linear infinite; }
@keyframes spin{ to{transform:rotate(360deg)} }
.leg{ transform-box:fill-box; transform-origin:top center; animation:swing .6s ease-in-out infinite; }
.leg-r{ animation-delay:-.3s; }
@keyframes swing{ 0%,100%{transform:rotate(-15deg)} 50%{transform:rotate(15deg)} }
.water{ animation:ripple 1.6s linear infinite; }
@keyframes ripple{ from{transform:translateX(0)} to{transform:translateX(-20px)} }
.smoke{ transform-box:fill-box; transform-origin:center; animation:puff 2.1s ease-out infinite; opacity:0; }
.s2{ animation-delay:.7s } .s3{ animation-delay:1.4s }
@keyframes puff{ 0%{transform:translateY(0) scale(.4);opacity:.95} 100%{transform:translateY(calc(var(--u)*-15)) scale(1.6);opacity:0} }
.prop{ transform-box:fill-box; transform-origin:center; animation:spin .32s linear infinite; }
.crank{ transform-box:fill-box; transform-origin:center; animation:spin 1.4s linear infinite; }
.claw-l,.claw-r{ transform-box:fill-box; animation:grab 1.1s ease-in-out infinite; }
.claw-l{ transform-origin:top right; --o:-16deg; } .claw-r{ transform-origin:top left; --o:16deg; }
@keyframes grab{ 0%,100%{transform:rotate(0)} 50%{transform:rotate(var(--o))} }
.bulb,.rays{ transform-box:fill-box; transform-origin:center; animation:glow 1.1s ease-in-out infinite alternate; }
@keyframes glow{ from{opacity:.5} to{opacity:1; filter:drop-shadow(0 0 2.2vmin #FFD34D)} }
.flame{ transform-box:fill-box; transform-origin:top center; animation:flick .22s ease-in-out infinite alternate; }
@keyframes flick{ from{transform:scaleY(.8)} to{transform:scaleY(1.15)} }

/* poked / driving = everything goes faster */
.poke .prop, #machine.drv .prop{ animation-duration:.11s; }
.poke .claw-l,.poke .claw-r, #machine.drv .claw-l,#machine.drv .claw-r{ animation-duration:.4s; }
.poke .bulb,.poke .rays, #machine.drv .bulb,#machine.drv .rays{ animation-duration:.16s; }
.poke .smoke, #machine.drv .smoke{ animation-duration:.9s; }
.poke .flame, #machine.drv .flame{ animation:flick .12s ease-in-out infinite alternate, flare .5s ease 1; }
@keyframes flare{ 40%{transform:scaleY(1.7) scaleX(1.25)} }

/* idle locomotion */
#inner.move-wheels{ animation:mv-wheels 1s ease-in-out infinite alternate; }
#inner.move-legs{ animation:mv-legs .65s ease-in-out infinite; }
#inner.move-hull{ animation:mv-hull 1.9s ease-in-out infinite alternate; transform-origin:center 82%; }
#inner.move-rails{ animation:mv-rails .3s ease-in-out infinite alternate; }
#inner.move-rocket{ animation:mv-rocket .5s ease-in-out infinite alternate; }
@keyframes mv-wheels{ from{transform:translateX(calc(var(--u)*-2)) rotate(-1.4deg)} to{transform:translateX(calc(var(--u)*2)) rotate(1.4deg)} }
@keyframes mv-legs{ 0%,100%{transform:translateY(0)} 45%{transform:translateY(calc(var(--u)*-3))} }
@keyframes mv-hull{ from{transform:rotate(-4.5deg)} to{transform:rotate(4.5deg)} }
@keyframes mv-rails{ from{transform:translateX(calc(var(--u)*-1.3))} to{transform:translateX(calc(var(--u)*1.3))} }
@keyframes mv-rocket{ from{transform:translateY(0)} to{transform:translateY(calc(var(--u)*-1.4))} }

/* drive-time machine motion */
#machine.drv-wheels{ animation:d-wheels .45s ease-in-out infinite; }
#machine.drv-legs{ animation:d-legs .55s cubic-bezier(.3,1.3,.5,1) infinite; }
#machine.drv-hull{ animation:d-hull 1.1s ease-in-out infinite alternate; }
#machine.drv-rails{ animation:d-rails .3s linear infinite; }
@keyframes d-wheels{ 0%,100%{transform:translateY(0) rotate(1.6deg)} 50%{transform:translateY(calc(var(--u)*-1.1)) rotate(1.6deg)} }
@keyframes d-legs{ 0%,100%{transform:translateY(0)} 42%{transform:translateY(calc(var(--u)*-10))} }
@keyframes d-hull{ from{transform:rotate(-3.5deg) translateY(0)} to{transform:rotate(3.5deg) translateY(calc(var(--u)*-1))} }
@keyframes d-rails{ 0%,100%{transform:translateY(0) rotate(1.2deg)} 50%{transform:translateY(calc(var(--u)*-.8)) rotate(1.2deg)} }

/* parachute */
#chute{ position:absolute; left:50%; top:calc(var(--u)*-21); width:calc(var(--u)*30);
  transform:translateX(-50%) scale(.2); opacity:0; transition:transform .3s cubic-bezier(.3,1.6,.5,1), opacity .25s; pointer-events:none; }
#chute.show{ transform:translateX(-50%) scale(1); opacity:1; }
#chute svg{ width:100%; display:block; }

/* ---------- LEVER ---------- */
#lever{ position:absolute; z-index:5; right:2.5vw; bottom:calc(var(--bench) + .4vh);
  width:calc(var(--u)*16); filter:grayscale(.75); opacity:.45; pointer-events:none; transition:filter .3s, opacity .3s; }
#lever svg{ width:100%; display:block; overflow:visible; }
#lever.armed{ filter:none; opacity:1; pointer-events:auto; cursor:pointer; }
#lever .stick{ transform-box:fill-box; transform-origin:50% 100%; transform:rotate(-44deg);
  transition:transform .22s cubic-bezier(.4,1.6,.5,1); }
#lever.pulled .stick{ transform:rotate(44deg); }
#lever.armed .knob{ animation:knobGlow 1s ease-in-out infinite alternate; }
@keyframes knobGlow{ from{filter:none} to{filter:drop-shadow(0 0 1.6vmin #FF8B7E)} }
#leverHint{ position:absolute; z-index:6; right:calc(2.5vw + var(--u)*4); bottom:calc(var(--bench) + var(--u)*26);
  width:calc(var(--u)*10); display:none; animation:hintBounce .7s ease-in-out infinite alternate; pointer-events:none; }
#leverHint.show{ display:block; }
#leverHint svg{ width:100%; display:block; }
@keyframes hintBounce{ from{transform:translateY(0)} to{transform:translateY(calc(var(--u)*3))} }

/* ---------- FX ---------- */
#fx{ position:absolute; inset:0; z-index:8; pointer-events:none; overflow:hidden; }
.bub{ position:absolute; pointer-events:auto; cursor:pointer; will-change:transform; }
.bub svg{ width:100%; height:100%; display:block; }
.spark{ position:absolute; pointer-events:none; will-change:transform; }
#confetti{ position:absolute; inset:0; z-index:9; pointer-events:none; overflow:hidden; }
#trophy{ position:absolute; z-index:10; left:50%; top:34%; width:26vh; transform:translate(-50%,-50%) scale(0);
  transition:transform .4s cubic-bezier(.3,1.6,.5,1); pointer-events:none; }
#trophy.show{ transform:translate(-50%,-50%) scale(1); }
#trophy svg{ width:100%; display:block; }

/* ---------- BANNER ---------- */
#banner{ flex:0 0 auto; height:8.5vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 4vw; }
#banner .msg{ font-size:min(8.4vw,4.6vh); font-weight:800; color:#F5872E;
  text-shadow:0 .4vh 0 #fff, 0 .6vh 1.2vh rgba(74,59,71,.12); line-height:1.02; }
#banner .hint{ font-size:min(5.4vw,3vh); font-weight:800; color:#A98D68; }
#banner.show .msg{ animation:pop .5s cubic-bezier(.3,1.6,.5,1) 1; }

/* ---------- TRAY ---------- */
#tray{ flex:0 0 auto; height:25vh; background:rgba(255,255,255,.62);
  border-top:.55vh solid #F0D19A; border-radius:6vw 6vw 0 0;
  box-shadow:0 -.4vh 2vh rgba(74,59,71,.07);
  display:flex; align-items:center; justify-content:center; gap:2vw; padding:1.4vh 2vw; position:relative; }
#tray.lock{ pointer-events:none; filter:saturate(.6) opacity(.7); }
.part{ flex:1 1 0; max-width:17vh; height:19vh; background:#fff; border-radius:3.4vw;
  box-shadow:0 .6vh 0 #E4C99A, 0 1vh 2vh rgba(74,59,71,.10); border:.45vh solid #F0D19A;
  display:flex; align-items:center; justify-content:center; cursor:pointer; touch-action:none; transition:transform .08s; }
.part svg{ width:82%; height:82%; pointer-events:none; }
.part:active{ transform:scale(.92); }
#tray.swap{ animation:swap .32s ease 1; }
@keyframes swap{ 0%{transform:translateY(0);opacity:1} 40%{transform:translateY(5vh);opacity:0} 60%{transform:translateY(5vh);opacity:0} 100%{transform:translateY(0);opacity:1} }
#again{ position:absolute; right:3vw; top:-11.6vh; width:9.6vh; height:9.6vh; border-radius:50%; z-index:6;
  background:#4CC27A; border:.6vh solid #fff; box-shadow:0 .8vh 0 #2F9C5B, 0 1vh 2vh rgba(74,59,71,.16);
  display:flex; align-items:center; justify-content:center; }
#again svg{ width:56%; height:56%; }
#again:active{ transform:translateY(.4vh); }
#again.nudge{ animation:hintBounce .6s ease-in-out 4 alternate; }

#ghost{ position:fixed; width:15vh; height:15vh; pointer-events:none; z-index:99; opacity:0; transform:translate(-50%,-50%) rotate(6deg); }
#ghost svg{ width:100%; height:100%; }

/* ---------- START OVERLAY ---------- */
#startOverlay{ position:fixed; inset:0; z-index:50; background:linear-gradient(180deg,#BFE7E2 0%,#FDF3D8 70%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3.5vh; }
#startTitle{ display:flex; align-items:center; gap:2.5vw; font-size:min(9.5vw,5.6vh); font-weight:800; color:var(--ink);
  background:#fff; border:.7vh solid var(--ink); border-radius:4vh; padding:1.4vh 5vw;
  box-shadow:0 .9vh 0 rgba(74,59,71,.2); transform:rotate(-2deg); }
#startTitle svg{ width:6vh; height:6vh; }
#startBeepo{ width:min(34vh,60vw); }
#startBeepo svg{ width:100%; display:block; animation:bIdle 2.4s ease-in-out infinite alternate; }
@keyframes bIdle{ from{transform:translateY(0) rotate(-1deg)} to{transform:translateY(-1.6vh) rotate(1.5deg)} }
#startBtn{ width:13vh; height:13vh; border-radius:50%; background:var(--orange);
  border:.8vh solid #fff; box-shadow:0 1vh 0 #C9641A, 0 1.4vh 2.6vh rgba(74,59,71,.25);
  display:flex; align-items:center; justify-content:center; }
#startBtn svg{ width:56%; height:56%; margin-left:6%; }
#startBtn:active{ transform:translateY(.6vh); box-shadow:0 .4vh 0 #C9641A; }

/* boot card (only if JS never runs) */
#boot{ position:absolute; inset:0; z-index:60; display:flex; align-items:center; justify-content:center; padding:9vw; text-align:center; }
#boot .card{ background:#fff; border:.6vh solid var(--ink); border-radius:6vw; padding:6vw; box-shadow:0 1vh 3vh rgba(74,59,71,.12); }
#boot .t{ font-size:7vw; font-weight:800; color:var(--orange); }

/* ================= AUDIO ================= */
let actx=null, sfxOn=true, musicOn=true, noiseBuf=null, musicTimer=null, nextNote=0, step=0;
function ac(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(actx&&actx.state==='suspended') actx.resume(); return actx; }
function tone(f,dur,type,vol,when){ if(!sfxOn) return; const a=ac(); if(!a) return;
  type=type||'sine'; vol=vol==null?0.16:vol; const t=a.currentTime+(when||0);
  const o=a.createOscillator(), g=a.createGain(); o.type=type; o.frequency.setValueAtTime(f,t);
  o.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.05); }
function slide(f1,f2,dur,type,vol){ if(!sfxOn) return; const a=ac(); if(!a) return; const t=a.currentTime;
  const o=a.createOscillator(), g=a.createGain(); o.type=type||'sine';
  o.frequency.setValueAtTime(f1,t); o.frequency.linearRampToValueAtTime(f2,t+dur);
  o.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.14,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.05); }
function noise(dur,vol,freq){ if(!sfxOn) return; const a=ac(); if(!a) return;
  if(!noiseBuf){ noiseBuf=a.createBuffer(1,a.sampleRate*0.6,a.sampleRate);
    const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; }
  const s=a.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  const g=a.createGain(), f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq||900;
  s.connect(f); f.connect(g); g.connect(a.destination); const t=a.currentTime;
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.1,t+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); s.start(t); s.stop(t+dur+0.05); }
function speak(text){ if(!sfxOn) return;
  try{ if('speechSynthesis' in window){ const u=new SpeechSynthesisUtterance(text);
    u.rate=0.95; u.pitch=1.35; speechSynthesis.cancel(); speechSynthesis.speak(u); } }catch(e){} }

/* music: a little workshop tune */
const LEAD=[784,659,523,659, 784,0,784,659, 880,784,659,784, 1047,0,784,0];
const BASSN=[262,196,220,196];
function schedule(){ const a=actx; if(!a) return;
  while(nextNote < a.currentTime+0.3){
    const i=step%16, f=LEAD[i];
    if(f&&musicOn){ const t2=nextNote, o=a.createOscillator(), g=a.createGain();
      o.type='triangle'; o.frequency.value=f; o.connect(g); g.connect(a.destination);
      g.gain.setValueAtTime(0.0001,t2); g.gain.exponentialRampToValueAtTime(0.05,t2+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t2+0.16); o.start(t2); o.stop(t2+0.2); }
    if(i%4===0&&musicOn){ const t2=nextNote, o=a.createOscillator(), g=a.createGain();
      o.type='square'; o.frequency.value=BASSN[(step/4|0)%4]; o.connect(g); g.connect(a.destination);
      g.gain.setValueAtTime(0.0001,t2); g.gain.exponentialRampToValueAtTime(0.035,t2+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t2+0.3); o.start(t2); o.stop(t2+0.34); }
    nextNote+=0.185; step++;
  } }
function startMusic(){ if(musicTimer||!ac()) return; nextNote=actx.currentTime+0.1; step=0;
  musicTimer=setInterval(schedule,100); }
function stopMusic(){ clearInterval(musicTimer); musicTimer=null; }

    setTimeout(()=>d.remove(),600); } }

function confettiBurst(n,mega){
  const colors=['#F25C54','#FFD94A','#7CC46B','#6B8BE8','#F5872E','#F8A8C8','#5FD6CD'];
  const rect=confettiL.getBoundingClientRect(), cx=rect.width/2, cy=rect.height*(mega?0.3:0.42);
  for(let i=0;i<n;i++){ const d=document.createElement('div');
    const size=8+Math.random()*9, star=i%3===0;
    d.style.cssText=`position:absolute;left:${cx}px;top:${cy}px;width:${size}px;height:${star?size:size*0.6}px;background:${colors[i%colors.length]};border-radius:2px;`+
      (star?'clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);':'');
    const dx=(Math.random()*2-1)*(mega?300:190), dy=70+Math.random()*(mega?420:280), rot=(Math.random()*2-1)*720;
    d.animate([{transform:'translate(0,0) rotate(0)',opacity:1},
      {transform:`translate(${dx}px,${dy}px) rotate(${rot}deg)`,opacity:0}],
      {duration:1100+Math.random()*600,easing:'cubic-bezier(.2,.7,.3,1)',fill:'forwards'});
    confettiL.appendChild(d); setTimeout(()=>d.remove(),1800); } }

function spawnProp(html,opts){ const d=el('prp',html); const H=vh(opts.h||8);
  d.style.width=H+'px'; d.style.height=H+'px';
  const W=stage.clientWidth;
  if(opts.fall){ d.style.left=(Math.random()*W)+'px'; d.style.top='-12vh'; propsL.appendChild(d);
    d.animate([{transform:'translateY(0)'},{transform:`translateY(${stage.clientHeight*1.3}px)`}],
      {duration:opts.dur||1100,easing:'linear'}).finished.then(()=>d.remove()).catch(()=>d.remove()); return; }
  if(opts.top!=null) d.style.top=opts.top; else d.style.bottom=opts.bottom||'calc(var(--bench)*0.85)';
  d.style.left='0'; propsL.appendChild(d);
  const from=W+80, to=-H-100, dur=opts.dur||2900;
  let kf;
  if(opts.arc){ kf=[{transform:`translate(${from}px,40px)`},{transform:`translate(${(from+to)/2}px,${-vh(9)}px)`,offset:.5},{transform:`translate(${to}px,40px)`}]; }
  else if(opts.bob){ kf=[{transform:`translate(${from}px,0)`},{transform:`translate(${from*0.5+to*0.5}px,${-vh(1.4)}px)`,offset:.5},{transform:`translate(${to}px,0)`}]; }
  else{ kf=[{transform:`translate(${from}px,0)`},{transform:`translate(${to}px,0)`}]; }
  d.animate(kf,{duration:dur,easing:'linear'}).finished.then(()=>d.remove()).catch(()=>d.remove()); }

function emitBubble(){ const r=topSlot.getBoundingClientRect(), s=stage.getBoundingClientRect();
  if(fx.querySelectorAll('.bub').length>9) return;
  const size=vh(3.2)+Math.random()*vh(2.6);
  const b=el('bub',`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="rgba(214,240,247,.55)" stroke="${INK}" stroke-width="6"/><ellipse cx="36" cy="34" rx="10" ry="14" fill="#fff" opacity=".8" transform="rotate(-20 36 34)"/></svg>`);
  b.style.cssText+=`width:${size}px;height:${size}px;left:${r.left-s.left+r.width*0.5-size/2+(Math.random()*40-20)}px;top:${r.top-s.top}px;`;
  fx.appendChild(b);
  const dx=(Math.random()*2-1)*vh(6), rise=vh(20)+Math.random()*vh(14);
  const anim=b.animate([{transform:'translate(0,0)'},{transform:`translate(${dx}px,${-rise}px)`}],
    {duration:3200+Math.random()*1200,easing:'ease-out'});
  anim.finished.then(()=>{ b.style.opacity='0'; setTimeout(()=>b.remove(),200); }).catch(()=>{});
  b.addEventListener('pointerdown',e=>{ e.stopPropagation(); anim.cancel(); popS();
    b.style.pointerEvents='none';
    b.animate([{transform:b.style.transform||'scale(1)',opacity:1},{transform:'scale(1.6)',opacity:0}],
      {duration:160,fill:'forwards'}); setTimeout(()=>b.remove(),180); }); }

/* ================= RENDER ================= */
function renderSlot(kind){ const elx=kind==='base'?baseSlot:topSlot;
  const idx=kind==='base'?state.base:state.top;
  elx.classList.remove('active');
  if(idx==null){ elx.innerHTML=`<div class="placeholder">${kind==='base'?SVG.ph_base:SVG.ph_top}</div>`;
    if(state.active===kind&&!state.built) elx.classList.add('active');
  }else{ const name=kind==='base'?BASES[idx]:TOPS[idx];
    elx.innerHTML=`<div class="fill pop">${SVG[name]}</div>`; } }

function setLocomotion(){ inner.className='';
  if(state.base!=null) inner.classList.add('move-'+BASES[state.base]); }

function applyPaint(){ const p=PAINTS[state.paint];
  inner.style.setProperty('--paint',p.c); inner.style.setProperty('--paintD',p.d); }

function setBanner(){ banner.classList.remove('show');
  if(state.built){ const r=RECIPES[state.base+'-'+state.top];
    banner.innerHTML=`<div class="msg">${r.name}!</div>`;
    void banner.offsetWidth; banner.classList.add('show');
  }else{ banner.innerHTML=`<div class="hint">${state.active==='base'?'Pick a bottom!':'Now pick a top!'}</div>`; } }

function renderTray(mode){ Array.from(tray.querySelectorAll('.part')).forEach(n=>n.remove());
  const mk=(html,data)=>{ const b=document.createElement('div'); b.className='part';
    b.setAttribute('role','button'); b.setAttribute('tabindex','0');
    Object.assign(b.dataset,data); b.innerHTML=html; tray.appendChild(b); return b; };
  if(mode==='mix'){
    PAINTS.forEach((p,i)=>mk(
      `<svg viewBox="0 0 100 100"><path d="M26 34 H74 L70 82 C69 90 31 90 30 82 Z" fill="${p.c}" stroke="${INK}" stroke-width="5" stroke-linejoin="round"/><ellipse cx="50" cy="34" rx="24" ry="8" fill="${p.d}" stroke="${INK}" stroke-width="4.5"/><path d="M62 40 c-2 10 2 16 6 16 c4 0 6 -6 4 -16" fill="${p.c}" stroke="${INK}" stroke-width="3.5" stroke-linejoin="round"/></svg>`,
      {kind:'paint',idx:i}));
    mk(SVG.dice,{kind:'dice'});
  }else{ const list=mode==='base'?BASES:TOPS;
    list.forEach((name,i)=>mk(SVG[name],{kind:mode,idx:i,name})); }
  tray.classList.remove('swap'); void tray.offsetWidth; tray.classList.add('swap'); }

/* ================= GAME FLOW ================= */
function assignRequest(){ let r; do{ r=REQUESTS[Math.random()*REQUESTS.length|0]; }while(REQUESTS.length>1&&r.id===state.lastReq);
  state.request=r; state.lastReq=r.id;
  reqChip.innerHTML=r.ico; reqChip.classList.remove('win'); reqChip.classList.add('show');
  beepoSay(r.line,true,3400); }

function earnStar(){
  const sock=starsBox.children[state.stars]; if(!sock) return;
  state.stars++;
  const mr=machine.getBoundingClientRect(), sr=sock.getBoundingClientRect();
  const f=el('spark',PROPS.star); const size=vh(5);
  f.style.cssText+=`position:fixed;width:${size}px;height:${size}px;left:${mr.left+mr.width/2-size/2}px;top:${mr.top-size}px;z-index:99;`;
  document.body.appendChild(f);
  f.animate([{transform:'translate(0,0) scale(1.2)'},{transform:`translate(${sr.left-(mr.left+mr.width/2-size/2)}px,${sr.top-(mr.top-size)}px) scale(.75)`}],
    {duration:700,easing:'cubic-bezier(.4,0,.4,1)',fill:'forwards'}).finished.then(()=>{
      f.remove(); sock.classList.add('on'); tada();
    }).catch(()=>f.remove());
  reqChip.classList.add('win'); setTimeout(()=>reqChip.classList.remove('show'),800);
  beepoFace('wow'); beepoHop(); beepoSay('You did it! A star!',true,2600);
  if(state.stars>=5) setTimeout(showTrophy,1200); }

function showTrophy(){ trophyEl.classList.add('show'); fanfare(); confettiBurst(60,true);
  speak('Star shelf complete! Hooray!');
  setTimeout(()=>{ trophyEl.classList.remove('show');
    Array.from(starsBox.children).forEach(s=>s.classList.remove('on'));
    state.stars=0; beepoSay("Let's fill it again!",false,2400); },2600); }

function completeBuild(first){
  renderSlot('base'); renderSlot('top'); setBanner();
  machine.classList.remove('celebrate'); void machine.offsetWidth; machine.classList.add('celebrate');
  const r=RECIPES[state.base+'-'+state.top];
  if(first){ state.builds++; confettiBurst(26);
    setTimeout(()=>{ jingle(); speak(r.name+'! '+r.say); },120);
    beepoFace('grin'); beepoHop(); beepoSay(r.name+'!',false,2200);
    lever.classList.add('armed');
    if(!state.leverUsed){ leverHint.classList.add('show'); setTimeout(()=>beepoSay('Pull the lever!',true,2400),1700); }
  }else{ confettiBurst(10); miniJingle(); speak(r.name+'!');
    beepoFace('grin'); beepoSay('Ooh! '+r.name+'!',false,2000); }
  setTimeout(()=>beepoFace('normal'),2200);
  if(state.request&&!state.starThisCycle&&state.request.test(state)){ state.starThisCycle=true; setTimeout(earnStar,900); }
  renderTray('mix'); }

function place(idx){ if(state.driving) return; ac();
  const kind=state.active; state[kind]=idx;
  renderSlot(kind); sparkle(kind==='base'?baseSlot:topSlot); ratchet();
  const name=kind==='base'?BASES[idx]:TOPS[idx];
  setTimeout(()=>(PART_SOUND[name]||function(){})(),200);
  setLocomotion();
  if(state.base!=null&&state.top!=null){ const first=!state.built; state.built=true; completeBuild(first); }
  else{ state.active=(state.base==null)?'base':'top';
    renderSlot('base'); renderSlot('top'); setBanner(); renderTray(state.active);
    beepoSay(['Ooh!','Nice one!','Beep!'][Math.random()*3|0],false,1400); } }

function paint(i){ if(state.driving) return; state.paint=i; applyPaint(); squish();
  const f=bodySlot.querySelector('.fill'); if(f){ f.classList.remove('pop'); void f.offsetWidth; f.classList.add('pop'); }
  sparkle(bodySlot); beepoSay(['Pretty!','Ooh, shiny!','Nice color!'][Math.random()*3|0],false,1500); }

let diceBusy=false;
function rollDice(){ if(state.driving||diceBusy||!state.built) return; diceBusy=true;
  let i=0; const iv=setInterval(()=>{ tone(300+Math.random()*500,0.04,'square',0.08);
    state.base=Math.random()*BASES.length|0; state.top=Math.random()*TOPS.length|0;
    renderSlot('base'); renderSlot('top');
    if(++i>=5){ clearInterval(iv); diceBusy=false; setLocomotion(); completeBuild(false); } },120); }

function reset(){ if(state.driving||diceBusy) return; ac();
  state.base=null; state.top=null; state.built=false; state.active='base'; state.starThisCycle=false;
  setLocomotion(); renderSlot('base'); renderSlot('top'); setBanner(); renderTray('base');
  lever.classList.remove('armed'); leverHint.classList.remove('show');
  reqChip.classList.remove('show'); state.request=null;
  clunk();
  if(state.builds>=1) setTimeout(assignRequest,600);
  else beepoSay("Let's build a machine!",false,2400); }

/* ================= POKES ================= */
function giggle(){ bodySlot.classList.add('giggle'); giggleS();
  machine.classList.remove('hopOnce'); void machine.offsetWidth; machine.classList.add('hopOnce');
  setTimeout(()=>bodySlot.classList.remove('giggle'),700); }
function pokeTop(){ if(state.top==null) return; topSlot.classList.add('poke');
  const n=TOPS[state.top];
  if(n==='bubbles'){ for(let i=0;i<4;i++) setTimeout(emitBubble,i*160); }
  (PART_SOUND[n]||function(){})();
  setTimeout(()=>topSlot.classList.remove('poke'),1100); }
function pokeBase(){ if(state.base==null) return; const n=BASES[state.base];
  if(n==='wheels'){ machine.classList.remove('wheelie'); void machine.offsetWidth; machine.classList.add('wheelie'); slide(140,320,0.3,'sawtooth',0.1); }
  else if(n==='legs'){ machine.classList.remove('hopOnce'); void machine.offsetWidth; machine.classList.add('hopOnce'); boing(); }
  else if(n==='hull'){ slosh(); sparkle(baseSlot); }
  else if(n==='rails'){ whistle(); machine.classList.remove('hopOnce'); void machine.offsetWidth; machine.classList.add('hopOnce'); }
  else if(n==='rocket'){ baseSlot.classList.add('poke'); noise(0.4,0.1,500); setTimeout(()=>baseSlot.classList.remove('poke'),600); } }

/* ================= TEST DRIVE ================= */
const DRIVE={
 wheels:{ end:'Vroom vroom!', loop:()=>{ tone(105,0.07,'square',0.09); tone(92,0.07,'square',0.09,0.09); }, every:340,
   props:[{k:'cone',every:900,o:{h:7,dur:2500}},{k:'cloud',every:1500,o:{h:8,top:'12%',dur:4200}}] },
 legs:{ end:'Boing boing!', loop:boing, every:550,
   props:[{k:'flower',every:650,o:{h:7,dur:2700}},{k:'bush',every:1400,o:{h:6,dur:2900}},{k:'cloud',every:1700,o:{h:8,top:'10%',dur:4200}}] },
 hull:{ end:'Splish splash!', loop:slosh, every:900,
   props:[{k:'fish',every:1200,o:{h:6.5,dur:2600,arc:true}},{k:'duck',every:2100,o:{h:7,dur:3400,bob:true}},{k:'cloud',every:1600,o:{h:8,top:'12%',dur:4200}}] },
 rails:{ end:'Choo choo!', loop:()=>{ tone(190,0.05,'square',0.1); tone(190,0.05,'square',0.1,0.09); }, every:480,
   props:[{k:'sign',every:1700,o:{h:9,dur:2400}},{k:'bush',every:900,o:{h:6,dur:2700}},{k:'cloud',every:1500,o:{h:8,top:'11%',dur:4200}}] }
};

async function driveScroll(baseName){
  const cfg=DRIVE[baseName];
  bench.classList.add('hide');
  terrain.className='t-'+baseName+' run'; terrain.style.display='block';
  machine.classList.add('drv','drv-'+baseName);
  if(baseName==='rails') whistle();
  const stops=[];
  stops.push(setInterval(cfg.loop,cfg.every)); cfg.loop();
  cfg.props.forEach(p=>{ spawnProp(PROPS[p.k],p.o); stops.push(setInterval(()=>spawnProp(PROPS[p.k],p.o),p.every)); });
  await wait(RM?2600:4700);
  stops.forEach(clearInterval);
  machine.classList.remove('drv','drv-'+baseName);
  terrain.classList.remove('run');
  await wait(260);
  terrain.style.display='none'; bench.classList.remove('hide'); }

async function driveRocket(){
  machine.classList.add('shake'); noise(1,0.12,450); slide(60,150,0.9,'sawtooth',0.1);
  await wait(RM?400:900); machine.classList.remove('shake');
  machine.classList.add('drv');
  baseSlot.classList.add('poke');
  slide(200,900,0.9,'sawtooth',0.12); noise(0.9,0.1,1400);
  const H=stage.clientHeight+vh(30);
  const up=machine.animate([{transform:'translateY(0)'},{transform:`translateY(${-H}px)`}],
    {duration:RM?800:1050,easing:'cubic-bezier(.5,0,.85,.4)',fill:'forwards'});
  const starIv=setInterval(()=>spawnProp(Math.random()<0.8?PROPS.star:PROPS.planet,{h:4+Math.random()*3,fall:true,dur:900+Math.random()*500}),110);
  await up.finished.catch(()=>{});
  beepoSay('To the stars!',false,1600);
  await wait(RM?300:650); clearInterval(starIv);
  chute.classList.add('show');
  slide(900,300,1.6,'triangle',0.07);
  const down=machine.animate([{transform:`translateY(${-H}px)`},{transform:'translateY(0)'}],
    {duration:RM?900:2200,easing:'cubic-bezier(.2,.6,.35,1)',fill:'forwards'});
  await down.finished.catch(()=>{});
  up.cancel(); down.cancel();
  baseSlot.classList.remove('poke'); machine.classList.remove('drv');
  thud(); chute.classList.remove('show'); popS();
  machine.classList.remove('hopOnce'); void machine.offsetWidth; machine.classList.add('hopOnce'); }

async function startDrive(){
  if(!state.built||state.driving||diceBusy) return; state.driving=true; ac();
  lever.classList.add('pulled'); clunk();
  state.leverUsed=true; leverHint.classList.remove('show');
  tray.classList.add('lock');
  stage.classList.add('driving');
  beepoFace('wow'); beepoSay('GO GO GO!',true,1800);
  const baseName=BASES[state.base];
  let bubIv=null;
  if(TOPS[state.top]==='bubbles') bubIv=setInterval(emitBubble,560);
  await wait(240);
  if(baseName==='rocket') await driveRocket(); else await driveScroll(baseName);
  if(bubIv) clearInterval(bubIv);
  propsL.innerHTML='';
  lever.classList.remove('pulled');
  stage.classList.remove('driving');
  tray.classList.remove('lock');
  beepoFace('grin'); beepoHop();
  const line=baseName==='rocket'?'To the stars and back!':DRIVE[baseName].end;
  beepoSay(line,true,2400);
  setTimeout(()=>beepoFace('normal'),2400);
  $('again').classList.remove('nudge'); void $('again').offsetWidth; $('again').classList.add('nudge');
  state.driving=false; }

/* ================= INPUT ================= */
let drag=null;
tray.addEventListener('pointerdown',e=>{ const p=e.target.closest('.part'); if(!p||state.driving) return; ac();
  drag={ el:p, x:e.clientX, y:e.clientY, moved:false };
  if(p.dataset.name){ ghost.innerHTML=SVG[p.dataset.name];
    ghost.style.left=e.clientX+'px'; ghost.style.top=e.clientY+'px'; ghost.style.opacity='1'; }
  if(p.setPointerCapture){ try{ p.setPointerCapture(e.pointerId); }catch(err){} }
  e.preventDefault(); });
tray.addEventListener('pointermove',e=>{ if(!drag) return;
  if(Math.abs(e.clientX-drag.x)>6||Math.abs(e.clientY-drag.y)>6) drag.moved=true;
  ghost.style.left=e.clientX+'px'; ghost.style.top=e.clientY+'px'; });
function trayAct(p){ const d=p.dataset;
  if(d.kind==='paint') paint(+d.idx);
  else if(d.kind==='dice') rollDice();
  else place(+d.idx); }
tray.addEventListener('pointerup',()=>{ if(!drag) return; const p=drag.el; drag=null;
  ghost.style.opacity='0'; ghost.innerHTML=''; trayAct(p); });
tray.addEventListener('pointercancel',()=>{ if(drag){ drag=null; ghost.style.opacity='0'; ghost.innerHTML=''; } });
window.addEventListener('pointerup',()=>{ if(drag){ const p=drag.el; drag=null;
  ghost.style.opacity='0'; ghost.innerHTML=''; trayAct(p); } });
tray.addEventListener('keydown',e=>{ const p=e.target.closest('.part');
  if(p&&(e.key==='Enter'||e.key===' ')){ e.preventDefault(); trayAct(p); } });

baseSlot.addEventListener('pointerup',()=>{ if(state.driving) return;
  if(state.built){ pokeBase(); state.active='base'; renderTray('base'); }
  else if(state.base!=null&&state.active!=='base'){ state.active='base';
    renderSlot('base'); renderSlot('top'); setBanner(); renderTray('base'); } });
topSlot.addEventListener('pointerup',()=>{ if(state.driving) return;
  if(state.built){ pokeTop(); state.active='top'; renderTray('top'); }
  else if(state.top!=null&&state.active!=='top'){ state.active='top';
    renderSlot('base'); renderSlot('top'); setBanner(); renderTray('top'); } });
bodySlot.addEventListener('pointerup',()=>{ if(state.driving) return; giggle();
  if(state.built) renderTray('mix'); });

lever.addEventListener('pointerup',startDrive);
$('again').addEventListener('pointerup',e=>{ e.stopPropagation(); reset(); });
reqChip.addEventListener('pointerup',()=>{ if(state.request) beepoSay(state.request.line,true,3000); });

/* pupils follow the pointer */
let ptX=0, ptY=0, ptQueued=false;
stage.addEventListener('pointermove',e=>{ ptX=e.clientX; ptY=e.clientY;
  if(!ptQueued){ ptQueued=true; requestAnimationFrame(()=>{ ptQueued=false;
    const r=bodySlot.getBoundingClientRect();
    const dx=Math.max(-1,Math.min(1,(ptX-(r.left+r.width/2))/(r.width)));
    const dy=Math.max(-1,Math.min(1,(ptY-(r.top+r.height/2))/(r.height)));
    bodySlot.style.setProperty('--px',(dx*3.5)+'px');
    bodySlot.style.setProperty('--py',(dy*3)+'px'); }); } });

/* toggles */
$('musicBtn').addEventListener('pointerup',()=>{ musicOn=!musicOn;
  $('musicBtn').classList.toggle('off',!musicOn);
  if(musicOn){ ac(); startMusic(); } });
$('sfxBtn').addEventListener('pointerup',()=>{ sfxOn=!sfxOn;
  $('sfxBtn').classList.toggle('off',!sfxOn);
  $('sfxBtn').innerHTML=`<svg viewBox="0 0 100 100"><use href="#${sfxOn?'ic-snd':'ic-sndoff'}"/></svg>`;
  if(!sfxOn){ try{ speechSynthesis.cancel(); }catch(e){} } });

/* start */
$('startBtn').addEventListener('pointerup',()=>{ ac();
  $('startOverlay').style.display='none';
  if(musicOn) startMusic();
  beepoFace('grin'); beepoHop(); beepoSay("Let's build a machine!",true,2600);
  setTimeout(()=>beepoFace('normal'),2200); });
window.addEventListener('pointerdown',ac,{once:true});

/* init */
applyPaint();
renderSlot('base'); renderSlot('top'); setBanner(); renderTray('base');
const _boot=$('boot'); if(_boot&&_boot.parentNode) _boot.parentNode.removeChild(_boot);

})();
</script>
</body>
